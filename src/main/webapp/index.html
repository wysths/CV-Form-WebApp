<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Segoe UI', system-ui, sans-serif; }</style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">

    <div class="max-w-lg w-full text-center">

        <!-- Icon + Title -->
        <div class="mb-10">
            <div class="w-16 h-16 bg-[#1e3a5f] rounded-2xl mx-auto mb-5 flex items-center justify-center">
                <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">CV Builder</h1>
            <p class="text-gray-500 mt-2 text-sm">Create a clean, professional CV in minutes.</p>
        </div>

        <!-- Buttons -->
        <div class="flex flex-col gap-4 mb-10">
            <a href="/CV-Form-App/CVController"
               class="bg-[#1e3a5f] text-white rounded-xl px-8 py-5 flex items-center gap-4 hover:bg-[#162d4a] transition-colors shadow-lg">
                <svg class="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
                <div class="text-left">
                    <div class="font-semibold text-base">Build My CV</div>
                    <div class="text-blue-200 text-xs mt-0.5">Fill in the form to generate your CV</div>
                </div>
            </a>

            <a href="/CV-Form-App/ExampleCVController"
               class="bg-white text-[#1e3a5f] rounded-xl px-8 py-5 flex items-center gap-4 hover:bg-blue-50 transition-colors shadow border border-gray-200">
                <svg class="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
                <div class="text-left">
                    <div class="font-semibold text-base">View Example CV</div>
                    <div class="text-gray-400 text-xs mt-0.5">See a sample CV with pre-filled data</div>
                </div>
            </a>
        </div>

        <p class="text-xs text-gray-400">Jakarta EE 10 · MVC Pattern · Tailwind CSS</p>
    </div>

</body>
</html>
